name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Foundation quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Restore .NET solution
        run: dotnet restore MaintenancePlanning.sln

      - name: Validate Terraform
        run: node scripts/terraform-validate.mjs

      - name: Check .NET formatting
        run: dotnet format MaintenancePlanning.sln --verify-no-changes --no-restore

      - name: Run .NET tests
        run: dotnet test MaintenancePlanning.sln --no-restore --disable-build-servers -m:1 -p:UseSharedCompilation=false

      - name: Run quality guards
        run: node scripts/quality-guards.mjs all

      - name: Run reviewer evidence smoke
        run: node scripts/reviewer-evidence-smoke.mjs

      - name: Validate event contracts
        run: node scripts/event-contract-smoke.mjs

      - name: Build EF migration bundle
        run: node scripts/build-migration-bundle.mjs

      - name: Test ECS migration release gate parsing
        run: node scripts/ecs-release-gate-tests.mjs

      - name: Dry-run ECS migration release gate
        run: npm run deploy:release-gate:dry-run

      - name: Build API container image
        env:
          IMAGE_NAME: maintenance-planning-api:${{ github.sha }}
          SOURCE_REVISION: ${{ github.sha }}
        run: node scripts/container-build.mjs

      - name: Build migration-runner container image
        env:
          MIGRATION_IMAGE_NAME: maintenance-planning-migration-runner:${{ github.sha }}
          SOURCE_REVISION: ${{ github.sha }}
        run: node scripts/migration-container-build.mjs

      - name: Smoke API container image
        env:
          IMAGE_NAME: maintenance-planning-api:${{ github.sha }}
        run: node scripts/container-smoke.mjs --skip-build
